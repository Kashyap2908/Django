{% extends 'home.html' %}

{% block css %}
<style>
    .container{
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
    }

    .welcome-box{
        background:white;
        width:500px;
        padding:30px;
        border-radius:15px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .welcome-box h1{
        text-align:center;
        margin-bottom:20px;
        color:#111827;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#2563eb;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#1d4ed8;
    }
</style>
{% endblock css %}

{% block title %}
Get Movie Details
{% endblock %}

{% block content %}

<div class="container">
    <div class="welcome-box">

        <h1>Add Movie Details</h1>

        <form method="get" action='/add'>
            <p>
                <label><strong>Movie Name:</strong></label><br>
                <input type="text" name="name" required>
            </p>

            <br>

            <p>
                <label><strong>Release Date:</strong></label><br>
                <input type="date" name="release_date" required>
            </p>

            <br>

            <p>
                <label><strong>Rating:</strong></label><br>
                <input type="number"
                       name="rating"
                       min="0"
                       max="10"
                       step="0.1"
                       required>
            </p>

            <br>

            <button type="submit">
                Save Movie
            </button>

        </form>

    </div>
</div>

{% endblock %}
