{% extends 'home.html' %}

{% block css %}
<style>
    .container{
        padding:40px;
    }

    .container h1{
        text-align:center;
        margin-bottom:25px;
        color:#111827;
    }

    table{
        width:80%;
        margin:auto;
        border-collapse:collapse;
        background:white;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    th{
        background:#111827;
        color:white;
        padding:12px;
    }

    td{
        padding:10px;
        text-align:center;
    }

    tr:nth-child(even){
        background:#f4f4f4;
    }

    tr:hover{
        background:#dbeafe;
    }
</style>
{% endblock css %}

{% block title %}
Show Movies
{% endblock %}

{% block content %}

<div class="container">
    
    <h1>Movie List</h1><br><br>

    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <th>Movie Name</th>
            <th>Release Date</th>
            <th>Rating</th>
        </tr>

        {% for i in m %}
        <tr>
            <td>{{ i.name }}</td>
            <td>{{ i.release_date }}</td>
            <td>{{ i.rating }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
